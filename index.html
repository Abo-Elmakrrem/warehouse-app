<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Meraki Packing</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="script.js" defer></script>
</head>

<body>

<div class="container">
    <div class="header">
        <h1>📦 Packing System</h1>
        <button id="darkModeBtn" class="btn btn-cl">🌙 Mode</button>
    </div>

    <div class="controls">
        <div class="controls-row">
    <label for="fileInput" class="btn btn-p">➕ Upload File</label>
    <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" />
    
    <button id="exportBtn" class="btn btn-ex">📥 Download Report</button>
    <button id="clearBtn" class="btn btn-cl">🗑️ Clear List</button>
    
    <button id="procurementBtn" class="btn btn-p">📦 Procurement View</button>
    <button id="packingViewBtn" class="btn btn-cl">📦 Packing View</button>
    <button id="exportProcurementBtn" class="btn btn-ex">📥 Export Procurement</button>
</div>
    </div>

    <input id="searchInput" type="text" class="search" placeholder="🔍 Search Order or Name...">
    <!-- dropdown for vendor -->
    

    <div id="orderList"></div>
</div>

<div id="chat-icon">💬</div>
<iframe id="chat-frame" src="https://cdn.botpress.cloud/webchat/v2.2/shareable.html?configUrl=https://files.bpcontent.cloud/2026/03/28/05/20260328054128-VW97585K.json"></iframe>

</body>
</html>
