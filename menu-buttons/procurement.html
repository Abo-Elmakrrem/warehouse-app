<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procurement</title>

    <!-- Main styles -->
    <link rel="stylesheet" href="../style.css" />

    <!-- Excel library -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Page logic -->
    <script src="../js-files-for-menu-buttons/procurement.js" defer></script>
  </head>

  <body>
    <!-- Back navigation -->
    <a href="../index.html" class="btn btn-cl">⬅ Back</a>

    <div class="container">
      <!-- Page title -->
      <h1>🛒 Procurement</h1>

      <!-- =============================
           🎛️ CONTROL PANEL
           ============================= -->
      <div class="controls">
        <div class="controls-row">
          <!-- Upload Orders -->
          <label for="fileInput" class="btn btn-p"> ➕ Upload Orders </label>
          <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" />
          <!-- shows the name of the uploaded file -->
          <span id="inventoryFileName" class="file-name"></span>
          <button id="exportBtn" class="btn btn-ex">📥 Export</button>
          <!-- Clear Data -->
          <button id="clearBtn" class="btn btn-cl">🗑️ Clear</button>
        </div>
      </div>

      <!-- =============================
           📊 OUTPUT (RESULT LIST)
           ============================= -->
      <table class="inventory-table">
        <thead>
          <tr>
            <th>Ordered</th>
            <th>Vendor</th>
            <th>Item</th>
            <th>SKU</th>
            <th>Order Qty</th>
            <th>Stock</th>
            <th>Need</th>
          </tr>
        </thead>

        <tbody id="orderList"></tbody>
      </table>
    </div>
  </body>
</html>
